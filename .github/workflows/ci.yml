name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      # Action SHAs pinned for supply-chain hardening;
      # .github/dependabot.yml keeps them current.
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Secret scan
        shell: pwsh
        run: ./scripts/Invoke-SecretScan.ps1 -Path .

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $bad = 0
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $errs = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errs)
            if ($errs.Count) {
              $bad++
              foreach ($e in $errs) { Write-Host "FAIL $($_.FullName): $($e.Message)" }
            }
          }
          if ($bad -gt 0) { exit 1 }
          Write-Host "all .ps1 files parse clean"

  pester:
    # Windows runner: bootstrap and the gate scripts are Windows-targeted,
    # and the staged-mode scanner tests need real git behavior.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Ensure Pester 5.x
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.7.0 -MaximumVersion 5.99.99

      - name: Run Pester suite
        shell: pwsh
        run: Invoke-Pester -Path ./tests -Output Detailed
