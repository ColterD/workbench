# .coderabbit.yaml — CodeRabbit starter config (workbench template)
#
# Copy to the ROOT of the adopting repository and commit it. The workbench
# wrapper (scripts/Invoke-CodeRabbitReview.ps1) refuses to run without it,
# and the central runner passes it verbatim to the CodeRabbit CLI.
#
# Requirements from the central runner (D:\Projects\coderabbit):
# - The file must live beneath D:\Projects (canonical path, after resolving
#   junctions/symlinks). Repo-root placement satisfies this automatically.
# - Contents are hashed into the review fingerprint: editing this file makes
#   the next review a fresh analysis, not a replay. That is intended —
#   config changes SHOULD trigger re-review.
# - No secrets in this file. It is hashed and copied, never redacted.
#
# Schema reference: https://docs.coderabbit.ai (Configuration Reference).
# Editor completion via the first line below.
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: false

reviews:
  # "chill" = fewer, higher-signal comments; "assertive" = flags more.
  # Start chill; go assertive on security-critical repos.
  profile: "chill"

  # Let reviewers request changes through CodeRabbit's review status.
  request_changes_workflow: false

  # Walkthrough comment at the top of each review.
  high_level_summary: true

  # The joke poem. Off.
  poem: false

  # Post a review status check on the PR.
  review_status: true

  collapse_walkthrough: false

  # Never review generated/vendored/lock content.
  path_filters:
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/node_modules/**"
    - "!**/vendor/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.generated.*"

  auto_review:
    enabled: true
    # Don't burn reviews on draft PRs.
    drafts: false
    # Skip noisy title prefixes.
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"

  # Per-path review focus. Add repo-specific rules here; keep instructions
  # concrete (what to flag), not aspirational ("write clean code").
  path_instructions:
    - path: "**/*.ps1"
      instructions: |
        Flag non-idempotent operations, missing error handling around
        external commands, and any secret-looking literal. PowerShell
        variables are case-insensitive — flag locals that differ from a
        parameter only by case.
    - path: "**/tests/**"
      instructions: |
        Verify fixtures are synthetic (no real-looking credentials) and
        that tests assert behavior, not implementation details.

chat:
  # Reply automatically to review-comment threads.
  auto_reply: true
